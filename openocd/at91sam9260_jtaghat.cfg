# OpenOCD config: JTAG Hat (Pi GPIO) -> AT91SAM9260
#
# Pi 3B+ peripheral base = 0x3F000000, already baked into jtag_hat_rpi2.cfg.
# The JTAG Hat has level shifters + dedicated SRST/TRST drive on the Pi
# header, so we can use srst safely.

source [find interface/jtag_hat_rpi2.cfg]

transport select jtag

# Conservative start; the AT91SAM9260 (ARM926EJ-S) JTAG works fine well
# above this once the PLL is up, but pre-PLL the chip runs from the slow
# clock so keep init speed modest.
adapter speed 1000

# The HAT has both nTRST and nSRST wired through buffers. AT91SAM9260
# tolerates SRST without issues; we don't need TRST since the chip has
# a TAP reset state machine.
reset_config srst_only srst_push_pull

source [find target/at91sam9260.cfg]
